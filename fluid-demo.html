<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Fluid Simulation — PIC/FLIP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e1a;
    color: #e0e6f0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Controls bar ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 10px 20px;
    background: #111827;
    border-bottom: 1px solid #1e293b;
    flex-wrap: wrap;
    z-index: 10;
  }
  .controls button {
    padding: 6px 16px;
    border: 1px solid #334155;
    border-radius: 6px;
    background: #1e293b;
    color: #e0e6f0;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  .controls button:hover { background: #334155; }
  .controls button.active { background: #2563eb; border-color: #3b82f6; }

  .slider-group {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
  }
  .slider-group label { color: #94a3b8; white-space: nowrap; }
  .slider-group input[type=range] {
    width: 100px;
    accent-color: #3b82f6;
  }
  .slider-group .val {
    min-width: 36px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .stats {
    margin-left: auto;
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: #64748b;
    font-variant-numeric: tabular-nums;
  }
  .stats span { white-space: nowrap; }

  /* ── Canvas ── */
  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  .hint {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: #475569;
    pointer-events: none;
    transition: opacity 0.4s;
  }
</style>
</head>
<body>

<div class="controls">
  <button id="btnPause">Pause</button>
  <button id="btnReset">Reset</button>
  <button id="btnDam">Dam Break</button>
  <button id="btnDrop">Drop</button>

  <div class="slider-group">
    <label>Gravity</label>
    <input type="range" id="slGravity" min="0" max="30" step="0.5" value="9.8">
    <span class="val" id="valGravity">9.8</span>
  </div>

  <div class="slider-group">
    <label>FLIP ratio</label>
    <input type="range" id="slFlip" min="0" max="1" step="0.05" value="0.9">
    <span class="val" id="valFlip">0.90</span>
  </div>

  <div class="slider-group">
    <label>Particles</label>
    <input type="range" id="slCount" min="500" max="8000" step="250" value="3000">
    <span class="val" id="valCount">3000</span>
  </div>

  <div class="stats">
    <span id="statFps">FPS: --</span>
    <span id="statParticles">Particles: 0</span>
  </div>
</div>

<div class="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div class="hint" id="hint">Click & drag to push the fluid</div>
</div>

<script>
// ============================================================
//  PIC/FLIP Fluid Simulation
//  Based on Matthias Müller's "Ten Minute Physics" approach
// ============================================================

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ── Simulation constants ──
const FLUID = 0, AIR = 1, SOLID = 2;

// ── State ──
let sim = null;
let paused = false;
let gravity = 9.8;
let flipRatio = 0.9;
let targetParticles = 3000;
let mouseDown = false;
let mouseX = 0, mouseY = 0;
let prevMouseX = 0, prevMouseY = 0;
let hintVisible = true;

// ── FPS tracking ──
let frameCount = 0;
let lastFpsTime = performance.now();
let displayFps = 0;

// ============================================================
//  Fluid Scene
// ============================================================
class FluidScene {
  constructor(width, height, h, particleRadius, numParticles) {
    // Domain
    this.width = width;
    this.height = height;
    this.h = h;        // grid cell size
    this.invH = 1 / h;

    // Grid dimensions (number of cells)
    this.numX = Math.floor(width / h) + 1;
    this.numY = Math.floor(height / h) + 1;
    const numCells = this.numX * this.numY;

    // Staggered MAC grid velocities
    this.u = new Float64Array(numCells);       // horizontal vel on vertical faces
    this.v = new Float64Array(numCells);       // vertical vel on horizontal faces
    this.prevU = new Float64Array(numCells);
    this.prevV = new Float64Array(numCells);
    this.uWeight = new Float64Array(numCells);
    this.vWeight = new Float64Array(numCells);

    // Cell classification
    this.cellType = new Int32Array(numCells);
    this.solid = new Float64Array(numCells);   // 0 = solid, 1 = open

    // Density tracking for drift correction
    this.particleDensity = new Float64Array(numCells);
    this.restDensity = 0;

    // Particle data
    this.maxParticles = numParticles + 4000; // room for spawning
    this.numParticles = 0;
    this.particleRadius = particleRadius;
    this.px = new Float64Array(this.maxParticles);
    this.py = new Float64Array(this.maxParticles);
    this.pvx = new Float64Array(this.maxParticles);
    this.pvy = new Float64Array(this.maxParticles);
    this.pColor = new Float64Array(this.maxParticles * 3); // RGB

    // Solver parameters
    this.overRelaxation = 1.9;
    this.numPressureIters = 80;

    // Initialize solid boundaries
    for (let i = 0; i < this.numX; i++) {
      for (let j = 0; j < this.numY; j++) {
        const idx = i + j * this.numX;
        if (i === 0 || i === this.numX - 1 || j === 0 || j === this.numY - 1) {
          this.solid[idx] = 0; // solid
        } else {
          this.solid[idx] = 1; // open
        }
      }
    }
  }

  // ── Flat index helper ──
  idx(i, j) {
    return i + j * this.numX;
  }

  // ── Initialize particles in a rectangular region ──
  initParticlesRect(x0, y0, x1, y1, spacing) {
    let count = 0;
    for (let x = x0; x < x1; x += spacing) {
      for (let y = y0; y < y1; y += spacing) {
        if (this.numParticles >= this.maxParticles) return count;
        const idx = this.numParticles;
        // Jitter to avoid grid artifacts
        this.px[idx] = x + (Math.random() - 0.5) * spacing * 0.4;
        this.py[idx] = y + (Math.random() - 0.5) * spacing * 0.4;
        this.pvx[idx] = 0;
        this.pvy[idx] = 0;
        this.pColor[idx * 3] = 0.12;
        this.pColor[idx * 3 + 1] = 0.47;
        this.pColor[idx * 3 + 2] = 1.0;
        this.numParticles++;
        count++;
      }
    }
    return count;
  }

  // ── 1. Apply gravity to particles ──
  integrateParticles(dt) {
    for (let i = 0; i < this.numParticles; i++) {
      this.pvy[i] += dt * gravity;
      this.px[i] += dt * this.pvx[i];
      this.py[i] += dt * this.pvy[i];

      // Clamp to domain boundaries
      const minX = this.h * 1.01;
      const maxX = this.width - this.h * 1.01;
      const minY = this.h * 1.01;
      const maxY = this.height - this.h * 1.01;

      if (this.px[i] < minX) { this.px[i] = minX; this.pvx[i] = 0; }
      if (this.px[i] > maxX) { this.px[i] = maxX; this.pvx[i] = 0; }
      if (this.py[i] < minY) { this.py[i] = minY; this.pvy[i] = 0; }
      if (this.py[i] > maxY) { this.py[i] = maxY; this.pvy[i] = 0; }
    }
  }

  // ── 2. Transfer particle velocities to grid (P2G) ──
  particleToGrid() {
    const n = this.numX;
    const h = this.h;
    const invH = this.invH;

    this.u.fill(0);
    this.v.fill(0);
    this.uWeight.fill(0);
    this.vWeight.fill(0);

    for (let p = 0; p < this.numParticles; p++) {
      const x = this.px[p];
      const y = this.py[p];

      // ── u-component (staggered: offset by h/2 in y) ──
      const ux = x * invH;
      const uy = (y - 0.5 * h) * invH;
      let ui = Math.floor(ux);
      let uj = Math.floor(uy);
      ui = Math.max(1, Math.min(ui, this.numX - 2));
      uj = Math.max(1, Math.min(uj, this.numY - 2));
      const udx = ux - ui;
      const udy = uy - uj;

      const w00u = (1 - udx) * (1 - udy);
      const w10u = udx * (1 - udy);
      const w01u = (1 - udx) * udy;
      const w11u = udx * udy;

      this.u[ui + uj * n]       += w00u * this.pvx[p]; this.uWeight[ui + uj * n]       += w00u;
      this.u[ui+1 + uj * n]     += w10u * this.pvx[p]; this.uWeight[ui+1 + uj * n]     += w10u;
      this.u[ui + (uj+1) * n]   += w01u * this.pvx[p]; this.uWeight[ui + (uj+1) * n]   += w01u;
      this.u[ui+1 + (uj+1) * n] += w11u * this.pvx[p]; this.uWeight[ui+1 + (uj+1) * n] += w11u;

      // ── v-component (staggered: offset by h/2 in x) ──
      const vx = (x - 0.5 * h) * invH;
      const vy = y * invH;
      let vi = Math.floor(vx);
      let vj = Math.floor(vy);
      vi = Math.max(1, Math.min(vi, this.numX - 2));
      vj = Math.max(1, Math.min(vj, this.numY - 2));
      const vdx = vx - vi;
      const vdy = vy - vj;

      const w00v = (1 - vdx) * (1 - vdy);
      const w10v = vdx * (1 - vdy);
      const w01v = (1 - vdx) * vdy;
      const w11v = vdx * vdy;

      this.v[vi + vj * n]       += w00v * this.pvy[p]; this.vWeight[vi + vj * n]       += w00v;
      this.v[vi+1 + vj * n]     += w10v * this.pvy[p]; this.vWeight[vi+1 + vj * n]     += w10v;
      this.v[vi + (vj+1) * n]   += w01v * this.pvy[p]; this.vWeight[vi + (vj+1) * n]   += w01v;
      this.v[vi+1 + (vj+1) * n] += w11v * this.pvy[p]; this.vWeight[vi+1 + (vj+1) * n] += w11v;
    }

    // Normalize
    for (let i = 0; i < this.u.length; i++) {
      if (this.uWeight[i] > 0) this.u[i] /= this.uWeight[i];
    }
    for (let i = 0; i < this.v.length; i++) {
      if (this.vWeight[i] > 0) this.v[i] /= this.vWeight[i];
    }

    // Save copy for FLIP delta
    this.prevU.set(this.u);
    this.prevV.set(this.v);
  }

  // ── 3. Classify cells ──
  classifyCells() {
    this.cellType.fill(AIR);
    // Boundaries are solid
    for (let i = 0; i < this.numX; i++) {
      for (let j = 0; j < this.numY; j++) {
        if (this.solid[this.idx(i, j)] === 0) {
          this.cellType[this.idx(i, j)] = SOLID;
        }
      }
    }
    // Mark cells containing particles as fluid
    for (let p = 0; p < this.numParticles; p++) {
      const ci = Math.floor(this.px[p] * this.invH);
      const cj = Math.floor(this.py[p] * this.invH);
      const i = Math.max(1, Math.min(ci, this.numX - 2));
      const j = Math.max(1, Math.min(cj, this.numY - 2));
      this.cellType[this.idx(i, j)] = FLUID;
    }
  }

  // ── 4. Pressure solve (Gauss-Seidel with overrelaxation) ──
  solvePressure() {
    const n = this.numX;

    for (let iter = 0; iter < this.numPressureIters; iter++) {
      for (let i = 1; i < this.numX - 1; i++) {
        for (let j = 1; j < this.numY - 1; j++) {
          if (this.cellType[this.idx(i, j)] !== FLUID) continue;

          const sx0 = this.solid[this.idx(i - 1, j)];
          const sx1 = this.solid[this.idx(i + 1, j)];
          const sy0 = this.solid[this.idx(i, j - 1)];
          const sy1 = this.solid[this.idx(i, j + 1)];
          const s = sx0 + sx1 + sy0 + sy1;
          if (s === 0) continue;

          let div = this.u[(i + 1) + j * n] - this.u[i + j * n]
                  + this.v[i + (j + 1) * n] - this.v[i + j * n];

          // Density correction to prevent drift
          if (this.restDensity > 0) {
            const stiffness = 1.0;
            const density = this.particleDensity[this.idx(i, j)];
            div -= stiffness * (density - this.restDensity);
          }

          div *= this.overRelaxation;

          this.u[i + j * n]       += div * sx0 / s;
          this.u[(i+1) + j * n]   -= div * sx1 / s;
          this.v[i + j * n]       += div * sy0 / s;
          this.v[i + (j+1) * n]   -= div * sy1 / s;
        }
      }
    }
  }

  // ── 5. Grid-to-particle transfer (PIC/FLIP blend) ──
  gridToParticle() {
    const n = this.numX;
    const h = this.h;
    const invH = this.invH;

    for (let p = 0; p < this.numParticles; p++) {
      const x = this.px[p];
      const y = this.py[p];

      // Interpolate u
      const ux = x * invH;
      const uy = (y - 0.5 * h) * invH;
      let ui = Math.floor(ux);
      let uj = Math.floor(uy);
      ui = Math.max(1, Math.min(ui, this.numX - 2));
      uj = Math.max(1, Math.min(uj, this.numY - 2));
      const udx = ux - ui;
      const udy = uy - uj;

      const w00 = (1 - udx) * (1 - udy);
      const w10 = udx * (1 - udy);
      const w01 = (1 - udx) * udy;
      const w11 = udx * udy;

      const newU = w00 * this.u[ui + uj * n]
                 + w10 * this.u[ui+1 + uj * n]
                 + w01 * this.u[ui + (uj+1) * n]
                 + w11 * this.u[ui+1 + (uj+1) * n];

      const oldU = w00 * this.prevU[ui + uj * n]
                 + w10 * this.prevU[ui+1 + uj * n]
                 + w01 * this.prevU[ui + (uj+1) * n]
                 + w11 * this.prevU[ui+1 + (uj+1) * n];

      const deltaU = newU - oldU;
      const flipU = this.pvx[p] + deltaU;
      this.pvx[p] = flipRatio * flipU + (1 - flipRatio) * newU;

      // Interpolate v
      const vx = (x - 0.5 * h) * invH;
      const vy = y * invH;
      let vi = Math.floor(vx);
      let vj = Math.floor(vy);
      vi = Math.max(1, Math.min(vi, this.numX - 2));
      vj = Math.max(1, Math.min(vj, this.numY - 2));
      const vdx = vx - vi;
      const vdy = vy - vj;

      const wv00 = (1 - vdx) * (1 - vdy);
      const wv10 = vdx * (1 - vdy);
      const wv01 = (1 - vdx) * vdy;
      const wv11 = vdx * vdy;

      const newV = wv00 * this.v[vi + vj * n]
                 + wv10 * this.v[vi+1 + vj * n]
                 + wv01 * this.v[vi + (vj+1) * n]
                 + wv11 * this.v[vi+1 + (vj+1) * n];

      const oldV = wv00 * this.prevV[vi + vj * n]
                 + wv10 * this.prevV[vi+1 + vj * n]
                 + wv01 * this.prevV[vi + (vj+1) * n]
                 + wv11 * this.prevV[vi+1 + (vj+1) * n];

      const deltaV = newV - oldV;
      const flipV = this.pvy[p] + deltaV;
      this.pvy[p] = flipRatio * flipV + (1 - flipRatio) * newV;
    }
  }

  // ── 6. Compute particle density per cell (for drift correction) ──
  computeParticleDensity() {
    const n = this.numX;
    const h = this.h;
    const invH = this.invH;
    this.particleDensity.fill(0);

    for (let p = 0; p < this.numParticles; p++) {
      // Density is sampled at cell centers: offset by h/2 in both axes
      const x = (this.px[p] - 0.5 * h) * invH;
      const y = (this.py[p] - 0.5 * h) * invH;
      let ci = Math.floor(x);
      let cj = Math.floor(y);
      ci = Math.max(1, Math.min(ci, this.numX - 2));
      cj = Math.max(1, Math.min(cj, this.numY - 2));
      const dx = x - ci;
      const dy = y - cj;

      this.particleDensity[ci + cj * n]       += (1 - dx) * (1 - dy);
      this.particleDensity[ci+1 + cj * n]     += dx * (1 - dy);
      this.particleDensity[ci + (cj+1) * n]   += (1 - dx) * dy;
      this.particleDensity[ci+1 + (cj+1) * n] += dx * dy;
    }

    // Compute rest density if not set yet
    if (this.restDensity === 0) {
      let sum = 0;
      let count = 0;
      for (let i = 0; i < this.cellType.length; i++) {
        if (this.cellType[i] === FLUID) {
          sum += this.particleDensity[i];
          count++;
        }
      }
      if (count > 0) this.restDensity = sum / count;
    }
  }

  // ── 7. Push apart overlapping particles ──
  pushParticlesApart(numIters) {
    const h = this.h;
    const invH = this.invH;
    const n = this.numX;
    const minDist = this.particleRadius * 2.0;
    const minDist2 = minDist * minDist;

    // Build spatial hash
    const cellCount = new Int32Array(n * this.numY);
    const cellFirst = new Int32Array(n * this.numY);
    const cellParticles = new Int32Array(this.numParticles);

    // Count particles per cell
    for (let p = 0; p < this.numParticles; p++) {
      const ci = Math.max(0, Math.min(Math.floor(this.px[p] * invH), this.numX - 1));
      const cj = Math.max(0, Math.min(Math.floor(this.py[p] * invH), this.numY - 1));
      cellCount[ci + cj * n]++;
    }

    // Prefix sum for starting indices
    let runningSum = 0;
    for (let i = 0; i < cellCount.length; i++) {
      cellFirst[i] = runningSum;
      runningSum += cellCount[i];
      cellCount[i] = 0; // reset for filling
    }

    // Fill particle indices
    for (let p = 0; p < this.numParticles; p++) {
      const ci = Math.max(0, Math.min(Math.floor(this.px[p] * invH), this.numX - 1));
      const cj = Math.max(0, Math.min(Math.floor(this.py[p] * invH), this.numY - 1));
      const idx = ci + cj * n;
      cellParticles[cellFirst[idx] + cellCount[idx]] = p;
      cellCount[idx]++;
    }

    // Push apart
    for (let iter = 0; iter < numIters; iter++) {
      for (let p = 0; p < this.numParticles; p++) {
        const ci = Math.floor(this.px[p] * invH);
        const cj = Math.floor(this.py[p] * invH);

        for (let di = -1; di <= 1; di++) {
          for (let dj = -1; dj <= 1; dj++) {
            const ni = ci + di;
            const nj = cj + dj;
            if (ni < 0 || ni >= this.numX || nj < 0 || nj >= this.numY) continue;
            const cellIdx = ni + nj * n;
            const start = cellFirst[cellIdx];
            const end = start + cellCount[cellIdx];

            for (let k = start; k < end; k++) {
              const q = cellParticles[k];
              if (q <= p) continue; // avoid double-processing

              const dx = this.px[q] - this.px[p];
              const dy = this.py[q] - this.py[p];
              const d2 = dx * dx + dy * dy;

              if (d2 > minDist2 || d2 < 1e-12) continue;

              const d = Math.sqrt(d2);
              const overlap = 0.5 * (minDist - d) / d;
              const ox = dx * overlap;
              const oy = dy * overlap;

              this.px[p] -= ox;
              this.py[p] -= oy;
              this.px[q] += ox;
              this.py[q] += oy;
            }
          }
        }
      }
    }
  }

  // ── Mouse force ──
  applyMouseForce(mx, my, mvx, mvy, radius, strength) {
    const r2 = radius * radius;
    for (let p = 0; p < this.numParticles; p++) {
      const dx = this.px[p] - mx;
      const dy = this.py[p] - my;
      const d2 = dx * dx + dy * dy;
      if (d2 < r2 && d2 > 1e-8) {
        const factor = strength * (1 - Math.sqrt(d2) / radius);
        this.pvx[p] += mvx * factor;
        this.pvy[p] += mvy * factor;
      }
    }
  }

  // ── Update colors based on velocity ──
  updateColors() {
    for (let p = 0; p < this.numParticles; p++) {
      const speed = Math.sqrt(this.pvx[p] * this.pvx[p] + this.pvy[p] * this.pvy[p]);
      const t = Math.min(speed / 6.0, 1.0);
      // Deep blue → sky blue → white
      this.pColor[p * 3]     = 0.08 + 0.92 * t;          // R
      this.pColor[p * 3 + 1] = 0.35 + 0.65 * t;          // G
      this.pColor[p * 3 + 2] = 0.85 + 0.15 * t;          // B
    }
  }

  // ── Full simulation step ──
  step(dt) {
    const subSteps = 2;
    const subDt = dt / subSteps;

    for (let s = 0; s < subSteps; s++) {
      this.integrateParticles(subDt);
      this.pushParticlesApart(2);
      this.particleToGrid();
      this.classifyCells();
      this.computeParticleDensity();
      this.solvePressure();
      this.gridToParticle();
    }

    this.updateColors();
  }
}

// ============================================================
//  Scene Setup
// ============================================================
function createScene(mode) {
  const simHeight = 3.0;
  const aspect = canvas.width / canvas.height;
  const simWidth = simHeight * aspect;

  const gridRes = 100;
  const h = simWidth / gridRes;
  const particleRadius = h * 0.3;
  const spacing = particleRadius * 2.0;

  sim = new FluidScene(simWidth, simHeight, h, particleRadius, targetParticles);

  if (mode === 'dam') {
    // Dam break: block of fluid on left side
    const fluidWidth = simWidth * 0.35;
    const fluidHeight = simHeight * 0.75;
    sim.initParticlesRect(
      h * 1.5, h * 1.5,
      fluidWidth, fluidHeight,
      spacing
    );
  } else if (mode === 'drop') {
    // Pool + falling drop
    const poolHeight = simHeight * 0.25;
    sim.initParticlesRect(
      h * 1.5, h * 1.5,
      simWidth - h * 1.5, poolHeight,
      spacing
    );
    // Drop above
    const dropCx = simWidth * 0.5;
    const dropCy = simHeight * 0.7;
    const dropR = simWidth * 0.1;
    for (let x = dropCx - dropR; x < dropCx + dropR; x += spacing) {
      for (let y = dropCy - dropR; y < dropCy + dropR; y += spacing) {
        if ((x - dropCx) ** 2 + (y - dropCy) ** 2 < dropR * dropR) {
          if (sim.numParticles >= sim.maxParticles) break;
          const idx = sim.numParticles;
          sim.px[idx] = x + (Math.random() - 0.5) * spacing * 0.3;
          sim.py[idx] = y + (Math.random() - 0.5) * spacing * 0.3;
          sim.pvx[idx] = 0;
          sim.pvy[idx] = 0;
          sim.numParticles++;
        }
      }
    }
  }

  document.getElementById('statParticles').textContent = `Particles: ${sim.numParticles}`;
}

// ============================================================
//  Rendering
// ============================================================
function render() {
  const w = canvas.width;
  const h = canvas.height;

  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, w, h);

  if (!sim) return;

  const scaleX = w / sim.width;
  const scaleY = h / sim.height;
  const drawRadius = Math.max(sim.particleRadius * scaleX * 1.1, 1.5);

  // Draw particles
  for (let p = 0; p < sim.numParticles; p++) {
    const sx = sim.px[p] * scaleX;
    const sy = h - sim.py[p] * scaleY; // flip Y

    const r = Math.floor(sim.pColor[p * 3] * 255);
    const g = Math.floor(sim.pColor[p * 3 + 1] * 255);
    const b = Math.floor(sim.pColor[p * 3 + 2] * 255);

    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.beginPath();
    ctx.arc(sx, sy, drawRadius, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw walls
  ctx.strokeStyle = '#1e3a5f';
  ctx.lineWidth = 2;
  ctx.strokeRect(1, 1, w - 2, h - 2);
}

// ============================================================
//  Main Loop
// ============================================================
function resizeCanvas() {
  const wrap = canvas.parentElement;
  canvas.width = wrap.clientWidth * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  canvas.style.width = wrap.clientWidth + 'px';
  canvas.style.height = wrap.clientHeight + 'px';
}

function update() {
  requestAnimationFrame(update);

  if (!paused && sim) {
    sim.step(1 / 60);

    // Mouse interaction
    if (mouseDown && sim) {
      const scaleX = sim.width / canvas.width;
      const scaleY = sim.height / canvas.height;
      const mx = mouseX * scaleX;
      const my = (canvas.height - mouseY) * scaleY;
      const mvx = (mouseX - prevMouseX) * scaleX * 8;
      const mvy = -(mouseY - prevMouseY) * scaleY * 8;
      sim.applyMouseForce(mx, my, mvx, mvy, sim.h * 5, 0.4);
    }
    prevMouseX = mouseX;
    prevMouseY = mouseY;
  }

  render();

  // FPS
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime > 500) {
    displayFps = Math.round(frameCount / ((now - lastFpsTime) / 1000));
    frameCount = 0;
    lastFpsTime = now;
    document.getElementById('statFps').textContent = `FPS: ${displayFps}`;
  }
}

// ============================================================
//  Input Handling
// ============================================================
function getCanvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: (clientX - rect.left) * devicePixelRatio,
    y: (clientY - rect.top) * devicePixelRatio
  };
}

canvas.addEventListener('mousedown', (e) => {
  mouseDown = true;
  const c = getCanvasCoords(e);
  mouseX = prevMouseX = c.x;
  mouseY = prevMouseY = c.y;
  if (hintVisible) { document.getElementById('hint').style.opacity = 0; hintVisible = false; }
});
canvas.addEventListener('mousemove', (e) => {
  const c = getCanvasCoords(e);
  mouseX = c.x;
  mouseY = c.y;
});
canvas.addEventListener('mouseup', () => { mouseDown = false; });
canvas.addEventListener('mouseleave', () => { mouseDown = false; });

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  mouseDown = true;
  const c = getCanvasCoords(e);
  mouseX = prevMouseX = c.x;
  mouseY = prevMouseY = c.y;
  if (hintVisible) { document.getElementById('hint').style.opacity = 0; hintVisible = false; }
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const c = getCanvasCoords(e);
  mouseX = c.x;
  mouseY = c.y;
}, { passive: false });
canvas.addEventListener('touchend', () => { mouseDown = false; });

// ============================================================
//  UI Controls
// ============================================================
document.getElementById('btnPause').addEventListener('click', function() {
  paused = !paused;
  this.textContent = paused ? 'Play' : 'Pause';
  this.classList.toggle('active', paused);
});

document.getElementById('btnReset').addEventListener('click', () => {
  resizeCanvas();
  createScene('dam');
});

document.getElementById('btnDam').addEventListener('click', () => {
  resizeCanvas();
  createScene('dam');
});

document.getElementById('btnDrop').addEventListener('click', () => {
  resizeCanvas();
  createScene('drop');
});

// Sliders
const slGravity = document.getElementById('slGravity');
const slFlip = document.getElementById('slFlip');
const slCount = document.getElementById('slCount');

slGravity.addEventListener('input', () => {
  gravity = parseFloat(slGravity.value);
  document.getElementById('valGravity').textContent = gravity.toFixed(1);
});

slFlip.addEventListener('input', () => {
  flipRatio = parseFloat(slFlip.value);
  document.getElementById('valFlip').textContent = flipRatio.toFixed(2);
});

slCount.addEventListener('input', () => {
  targetParticles = parseInt(slCount.value);
  document.getElementById('valCount').textContent = targetParticles;
});

// ============================================================
//  Init
// ============================================================
window.addEventListener('resize', () => {
  resizeCanvas();
  createScene('dam');
});

resizeCanvas();
createScene('dam');
update();
</script>
